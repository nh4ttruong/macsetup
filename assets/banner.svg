<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" width="1600" height="840" role="img" aria-label="macsetup — one script, one fresh Mac">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="url(#bg)"/>
  <circle cx="1200" cy="180" r="420" fill="url(#glow)"/>
  <circle cx="280" cy="700" r="380" fill="url(#glow)" opacity="0.6"/>

  <!-- Faint grid -->
  <g stroke="#21262d" stroke-width="1" opacity="0.45">
    <path d="M0 210 H1600 M0 420 H1600 M0 630 H1600"/>
    <path d="M400 0 V840 M800 0 V840 M1200 0 V840"/>
  </g>

  <!-- Left column: title + tagline -->
  <g font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif">

    <!-- Title -->
    <text x="100" y="320" font-size="128" font-weight="800" fill="#f0f6fc" letter-spacing="-3">
      macsetup
    </text>

    <!-- Accent underline -->
    <rect x="100" y="345" width="220" height="6" rx="3" fill="url(#accent)"/>

    <!-- Subtitle -->
    <text x="100" y="430" font-size="38" font-weight="500" fill="#c9d1d9">
      One script. One fresh Mac.
    </text>
    <text x="100" y="480" font-size="38" font-weight="500" fill="#c9d1d9">
      Zero "what was that tool again?"
    </text>

    <!-- Footer attribution -->
    <text x="100" y="760" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace"
          font-size="20" font-weight="500" fill="#6e7681">
      github.com/nh4ttruong/macsetup
    </text>
  </g>

  <!-- Right column: faux terminal -->
  <g transform="translate(900, 220)" filter="url(#softShadow)">
    <!-- Window -->
    <rect x="0" y="0" width="600" height="400" rx="14" fill="#0b0f14" stroke="#30363d" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="600" height="42" rx="14" fill="#161b22"/>
    <rect x="0" y="28" width="600" height="14" fill="#161b22"/>
    <!-- Traffic lights -->
    <circle cx="24" cy="21" r="7" fill="#ff5f57"/>
    <circle cx="46" cy="21" r="7" fill="#febc2e"/>
    <circle cx="68" cy="21" r="7" fill="#28c840"/>
    <!-- Window title -->
    <text x="300" y="27" text-anchor="middle"
          font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
          font-size="14" font-weight="500" fill="#6e7681">
      ~ — zsh
    </text>

    <!-- Terminal body -->
    <g font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', Menlo, monospace" font-size="17">
      <!-- Line 1: command -->
      <text x="26" y="92" fill="#7ee787" font-weight="700">$</text>
      <text x="50" y="92" fill="#c9d1d9">./setup all</text>

      <!-- Output -->
      <text x="26" y="166" fill="#58a6ff">›</text>
      <text x="50" y="166" fill="#8b949e">Bootstrapping Homebrew...</text>
      <text x="50" y="166" fill="#7ee787" dx="320">ok</text>

      <text x="26" y="198" fill="#58a6ff">›</text>
      <text x="50" y="198" fill="#8b949e">Configuring zsh + completions...</text>
      <text x="50" y="198" fill="#7ee787" dx="320">ok</text>

      <text x="26" y="230" fill="#58a6ff">›</text>
      <text x="50" y="230" fill="#8b949e">Installing nvm + Node 24...</text>
      <text x="50" y="230" fill="#7ee787" dx="320">ok</text>

      <text x="26" y="262" fill="#58a6ff">›</text>
      <text x="50" y="262" fill="#8b949e">CLI tools (jq, yq, pnpm, ...)...</text>
      <text x="50" y="262" fill="#7ee787" dx="320">ok</text>

      <text x="26" y="294" fill="#58a6ff">›</text>
      <text x="50" y="294" fill="#8b949e">Apps + fonts (cask)...</text>
      <text x="50" y="294" fill="#7ee787" dx="320">ok</text>

      <text x="26" y="326" fill="#58a6ff">›</text>
      <text x="50" y="326" fill="#8b949e">gitswitch profiles...</text>
      <text x="50" y="326" fill="#d29922" dx="320">skipped</text>

      <!-- Cursor line -->
      <text x="26" y="368" fill="#7ee787" font-weight="700">$</text>
      <rect x="50" y="354" width="11" height="20" fill="#c9d1d9">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
